# .github/workflows/deploy-social.yml kimi qoyun.
# Konteyner/CI-dən Cloudflare-ə deploy. Secrets (repo Settings → Actions):
#   CLOUDFLARE_API_TOKEN  (dash.cloudflare.com/profile/api-tokens → "Edit Cloudflare Workers")
#   ZERNIO_API_KEYS       (sk_...,sk_...)
#   RUN_TOKEN             (istənilən uzun təsadüfi sətir)
name: Deploy social
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["social/**", "social-worker/**", ".github/workflows/deploy-social.yml"]

jobs:
  deploy-site:
    name: Saytı deploy et (slaydlar + content.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: <CLOUDFLARE_ACCOUNT_ID>
          wranglerVersion: "4"

  deploy-worker:
    name: Worker-i deploy et
    runs-on: ubuntu-latest
    needs: deploy-site
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: <CLOUDFLARE_ACCOUNT_ID>
          wranglerVersion: "4"
          workingDirectory: social-worker
          secrets: |
            ZERNIO_API_KEYS
            RUN_TOKEN
        env:
          ZERNIO_API_KEYS: ${{ secrets.ZERNIO_API_KEYS }}
          RUN_TOKEN: ${{ secrets.RUN_TOKEN }}
